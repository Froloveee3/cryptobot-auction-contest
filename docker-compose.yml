
x-backend-env: &backend_env
  ALLOW_INSECURE_QUERY_USERID: ${ALLOW_INSECURE_QUERY_USERID:-false}
  JWT_EXPIRES_IN_SEC: ${JWT_EXPIRES_IN_SEC:-3600}
  ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
  ADMIN_PASSWORD: ${ADMIN_PASSWORD:-adminadmin}
  TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
  RATE_LIMIT_DISABLED: "${RATE_LIMIT_DISABLED:-false}"
  RATE_LIMIT_MULTIPLIER: "${RATE_LIMIT_MULTIPLIER:-1}"

x-backend-env-dev: &backend_env_dev
  <<: *backend_env
  NODE_ENV: ${NODE_ENV:-development}
  CHOKIDAR_USEPOLLING: ${CHOKIDAR_USEPOLLING:-true}
  CORS_ORIGIN: ${CORS_ORIGIN:-*}
  MONGODB_URI: ${MONGODB_URI_DOCKER:-mongodb://admin:password@mongodb:27017/auction_db?authSource=admin&replicaSet=rs0}
  REDIS_HOST: ${REDIS_HOST_DOCKER:-redis}
  REDIS_PORT: ${REDIS_PORT:-6379}
  REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_password}
  REDIS_DB: ${REDIS_DB:-0}
  QUEUE_REDIS_HOST: ${QUEUE_REDIS_HOST_DOCKER:-}
  QUEUE_REDIS_PORT: ${QUEUE_REDIS_PORT_DOCKER:-}
  QUEUE_REDIS_PASSWORD: ${QUEUE_REDIS_PASSWORD_DOCKER:-}
  QUEUE_REDIS_DB: ${QUEUE_REDIS_DB_DOCKER:-1}

x-backend-env-perf: &backend_env_perf
  <<: *backend_env
  NODE_ENV: production
  PORT: 3000
  API_PREFIX: ${API_PREFIX:-api}
  CORS_ORIGIN: ${CORS_ORIGIN_PERF:-http://localhost:3001}
  MONGODB_URI: ${MONGODB_URI_DOCKER:-mongodb://admin:password@mongodb:27017/auction_db?authSource=admin&replicaSet=rs0}
  REDIS_HOST: ${REDIS_HOST_DOCKER:-redis}
  REDIS_PORT: ${REDIS_PORT:-6379}
  REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_password}
  REDIS_DB: ${REDIS_DB:-0}
  QUEUE_REDIS_HOST: ${QUEUE_REDIS_HOST_DOCKER:-}
  QUEUE_REDIS_PORT: ${QUEUE_REDIS_PORT_DOCKER:-}
  QUEUE_REDIS_PASSWORD: ${QUEUE_REDIS_PASSWORD_DOCKER:-}
  QUEUE_REDIS_DB: ${QUEUE_REDIS_DB_DOCKER:-1}

x-backend-env-prod: &backend_env_prod
  <<: *backend_env
  NODE_ENV: production
  PORT: 3000
  API_PREFIX: ${API_PREFIX:-api}
  CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3001}
  MONGODB_URI: ${MONGODB_URI_DOCKER:-mongodb://admin:password@mongodb:27017/auction_db?authSource=admin&replicaSet=rs0}
  REDIS_HOST: ${REDIS_HOST_DOCKER:-redis}
  REDIS_PORT: ${REDIS_PORT:-6379}
  REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_password}
  REDIS_DB: ${REDIS_DB:-0}
  QUEUE_REDIS_HOST: ${QUEUE_REDIS_HOST_DOCKER:-}
  QUEUE_REDIS_PORT: ${QUEUE_REDIS_PORT_DOCKER:-}
  QUEUE_REDIS_PASSWORD: ${QUEUE_REDIS_PASSWORD_DOCKER:-}
  QUEUE_REDIS_DB: ${QUEUE_REDIS_DB_DOCKER:-1}

x-backend-depends: &backend_depends
  mongodb:
    condition: service_healthy
  mongodb-init:
    condition: service_completed_successfully
  redis:
    condition: service_healthy

services:
  mongodb-keyfile-init:
    image: mongo:7.0
    container_name: auction-mongodb-keyfile-init
    restart: "no"
    networks:
      - auction-network
    volumes:
      - mongodb_keyfile:/keyfile
    entrypoint: >
      bash -c "
      set -euo pipefail;
      if [ ! -f /keyfile/mongodb-keyfile ]; then
        echo 'Generating MongoDB keyFile...';
        openssl rand -base64 756 > /keyfile/mongodb-keyfile;
        chown 999:999 /keyfile/mongodb-keyfile;
        chmod 400 /keyfile/mongodb-keyfile;
      else
        echo 'MongoDB keyFile already exists';
      fi
      "
    mem_limit: 128m
    memswap_limit: 128m

  mongodb:
    image: mongo:7.0
    container_name: auction-mongodb
    restart: unless-stopped
    depends_on:
      - mongodb-keyfile-init
    ports:
      - "27017:27017"
    command: ["mongod", "--bind_ip_all", "--replSet", "rs0", "--keyFile", "/etc/mongodb-keyfile/mongodb-keyfile"]
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-password}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE:-auction_db}
    volumes:
      - mongodb_data:/data/db
      - mongodb_keyfile:/etc/mongodb-keyfile:ro
    networks:
      - auction-network
    healthcheck:
      test: ["CMD-SHELL", "mongosh -u $$MONGO_INITDB_ROOT_USERNAME -p $$MONGO_INITDB_ROOT_PASSWORD --authenticationDatabase admin --quiet --eval \"db.adminCommand('ping').ok\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    mem_limit: 3g
    memswap_limit: 3g

  mongodb-init:
    image: mongo:7.0
    container_name: auction-mongodb-init
    restart: "no"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - auction-network
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-password}
      MONGO_RS_HOST: ${MONGO_RS_HOST_DOCKER:-mongodb:27017}
    entrypoint: >
      bash -c "
      echo 'Waiting for MongoDB to be ready...' &&
      until mongosh mongodb://$$MONGO_INITDB_ROOT_USERNAME:$$MONGO_INITDB_ROOT_PASSWORD@mongodb:27017/admin --quiet --eval 'db.adminCommand(\"ping\")' 2>/dev/null; do
        echo 'Waiting for MongoDB...' &&
        sleep 2
      done &&
      echo 'MongoDB is ready!' &&
      echo 'Checking replica set status...' &&
      mongosh mongodb://$$MONGO_INITDB_ROOT_USERNAME:$$MONGO_INITDB_ROOT_PASSWORD@mongodb:27017/admin --quiet --eval '
        try {
          var status = rs.status();
          var conf = rs.conf();
          var desiredHost = \"'$$MONGO_RS_HOST'\"; 
          if (conf.members && conf.members.length > 0 && conf.members[0].host !== desiredHost) {
            print(\"Replica set initialized, but host is \" + conf.members[0].host + \". Reconfiguring to \" + desiredHost + \"...\");
            conf.members[0].host = desiredHost;
            rs.reconfig(conf, { force: true });
            print(\"Replica set reconfigured successfully\");
          } else {
            print(\"Replica set already initialized\");
          }
        } catch(e) {
          print(\"Initializing replica set...\");
          rs.initiate({
            _id: \"rs0\",
            members: [{ _id: 0, host: \"'$$MONGO_RS_HOST'\" }]
          });
          print(\"Replica set initialized successfully\");
        }
      ' &&
      echo 'Replica set initialization complete'
      "
    mem_limit: 256m
    memswap_limit: 256m

  redis:
    image: redis:7.2-alpine
    container_name: auction-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_password} --maxmemory 384mb --maxmemory-policy noeviction
    volumes:
      - redis_data:/data
    networks:
      - auction-network
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD:-redis_password}\" ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 512m
    memswap_limit: 512m

  backend:
    profiles: ["dev"]
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      <<: *backend_env_dev
      PORT: ${BACKEND_PORT:-3000}
      JWT_SECRET: ${JWT_SECRET:-dev_insecure_secret_change_me}
      NODE_OPTIONS: ${BACKEND_NODE_OPTIONS:---max-old-space-size=768}
    depends_on:
      <<: *backend_depends
    networks:
      - auction-network
    volumes:
      - ./backend/src:/app/src
      - ./backend/package.json:/app/package.json
      - ./backend/package-lock.json:/app/package-lock.json
      - ./backend/tsconfig.json:/app/tsconfig.json
    mem_limit: 1g
    memswap_limit: 1g
    pids_limit: 512

  backend-prod:
    profiles: ["prod"]
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      <<: *backend_env_prod
      JWT_SECRET: ${JWT_SECRET:-dev_insecure_secret_change_me}
      NODE_OPTIONS: ${BACKEND_NODE_OPTIONS:---max-old-space-size=768}
    depends_on:
      <<: *backend_depends
    networks:
      - auction-network
    mem_limit: 1.5g
    memswap_limit: 1.5g
    pids_limit: 512

  backend-worker:
    profiles: ["dev"]
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    restart: unless-stopped
    command: ["npm", "run", "start:worker:dev"]
    environment:
      <<: *backend_env_dev
      JWT_SECRET: ${JWT_SECRET:-dev_insecure_secret_change_me}
      BID_INTAKE_CONCURRENCY: "${BID_INTAKE_CONCURRENCY:-50}"
      NODE_OPTIONS: ${BACKEND_WORKER_NODE_OPTIONS:---max-old-space-size=768}
    depends_on:
      <<: *backend_depends
    networks:
      - auction-network
    volumes:
      - ./backend/src:/app/src
      - ./backend/package.json:/app/package.json
      - ./backend/package-lock.json:/app/package-lock.json
      - ./backend/tsconfig.json:/app/tsconfig.json
    mem_limit: 1g
    memswap_limit: 1g
    pids_limit: 512

  backend-worker-prod:
    profiles: ["prod"]
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["node", "dist/main.worker"]
    environment:
      <<: *backend_env_prod
      JWT_SECRET: ${JWT_SECRET:-dev_insecure_secret_change_me}
      BID_INTAKE_CONCURRENCY: "${BID_INTAKE_CONCURRENCY:-50}"
      NODE_OPTIONS: ${BACKEND_WORKER_NODE_OPTIONS:---max-old-space-size=768}
    depends_on:
      <<: *backend_depends
    networks:
      - auction-network
    mem_limit: 1.5g
    memswap_limit: 1.5g
    pids_limit: 512

  backend-perf:
    profiles: ["perf"]
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3002:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      <<: *backend_env_perf
      JWT_SECRET: ${JWT_SECRET_PERF:-perf_secret_change_me}
      NODE_OPTIONS: ${BACKEND_PERF_NODE_OPTIONS:---max-old-space-size=1024}
    depends_on:
      <<: *backend_depends
    networks:
      - auction-network
    mem_limit: 1250m
    memswap_limit: 1250m
    pids_limit: 512

  backend-worker-perf:
    profiles: ["perf"]
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["node", "dist/main.worker"]
    environment:
      <<: *backend_env_perf
      JWT_SECRET: ${JWT_SECRET_PERF:-perf_secret_change_me}
      BID_INTAKE_CONCURRENCY: "${BID_INTAKE_CONCURRENCY_PERF:-100}"
    depends_on:
      <<: *backend_depends
    networks:
      - auction-network
    mem_limit: 1g
    memswap_limit: 1g
    pids_limit: 512

  frontend:
    profiles: ["dev"]
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3001}:3000"
    environment:
      CHOKIDAR_USEPOLLING: ${CHOKIDAR_USEPOLLING:-true}
      WDS_SOCKET_HOST: ${WDS_SOCKET_HOST:-cryptobot-auction-contest.ru}
      WDS_SOCKET_PORT: ${WDS_SOCKET_PORT:-443}
      WDS_SOCKET_PATH: ${WDS_SOCKET_PATH:-/ws}
      WDS_SOCKET_PROTOCOL: ${WDS_SOCKET_PROTOCOL:-wss}
      PORT: "3000"
      REACT_APP_API_URL: ${REACT_APP_API_URL:-https://api.cryptobot-auction-contest.ru}
      REACT_APP_WS_URL: ${REACT_APP_WS_URL:-wss://ws.cryptobot-auction-contest.ru}
      NODE_OPTIONS: ${FRONTEND_NODE_OPTIONS:---max-old-space-size=768}
    depends_on:
      backend:
        condition: service_started
    networks:
      - auction-network
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/package.json:/app/package.json
      - ./frontend/package-lock.json:/app/package-lock.json
      - ./frontend/tsconfig.json:/app/tsconfig.json
    mem_limit: 1g
    memswap_limit: 1g
    pids_limit: 512

  frontend-prod:
    profiles: ["prod"]
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:3000}
        REACT_APP_WS_URL: ${REACT_APP_WS_URL:-ws://localhost:3000}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3001}:80"
    depends_on:
      backend-prod:
        condition: service_started
    networks:
      - auction-network
    mem_limit: 1.5g
    memswap_limit: 1.5g
    pids_limit: 512

  k6:
    profiles: ["loadtest"]
    image: grafana/k6:latest
    networks:
      - auction-network
    volumes:
      - ./loadtest:/scripts
    entrypoint: ["k6"]

  mongodb-init-host:
    profiles: ["hybrid"]
    image: mongo:7.0
    container_name: auction-mongodb-init-host
    restart: "no"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - auction-network
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-password}
      MONGO_RS_HOST: ${MONGO_RS_HOST_HOSTMODE:-localhost:27017}
    entrypoint: >
      bash -c "
      echo 'Waiting for MongoDB to be ready (host-mode init)...' &&
      until mongosh mongodb://$$MONGO_INITDB_ROOT_USERNAME:$$MONGO_INITDB_ROOT_PASSWORD@mongodb:27017/admin --quiet --eval 'db.adminCommand(\"ping\")' 2>/dev/null; do
        echo 'Waiting for MongoDB...' &&
        sleep 2
      done &&
      echo 'MongoDB is ready!' &&
      echo 'Checking replica set status (host-mode)...' &&
      mongosh mongodb://$$MONGO_INITDB_ROOT_USERNAME:$$MONGO_INITDB_ROOT_PASSWORD@mongodb:27017/admin --quiet --eval '
        try {
          var status = rs.status();
          var conf = rs.conf();
          var desiredHost = \"'$$MONGO_RS_HOST'\"; 
          if (conf.members && conf.members.length > 0 && conf.members[0].host !== desiredHost) {
            print(\"Replica set initialized, but host is \" + conf.members[0].host + \". Reconfiguring to \" + desiredHost + \"...\");
            conf.members[0].host = desiredHost;
            rs.reconfig(conf, { force: true });
            print(\"Replica set reconfigured successfully\");
          } else {
            print(\"Replica set already initialized\");
          }
        } catch(e) {
          print(\"Initializing replica set...\");
          rs.initiate({
            _id: \"rs0\",
            members: [{ _id: 0, host: \"'$$MONGO_RS_HOST'\" }]
          });
          print(\"Replica set initialized successfully\");
        }
      ' &&
      echo 'Replica set host-mode initialization complete'
      "
    mem_limit: 256m
    memswap_limit: 256m

volumes:
  mongodb_data:
  redis_data:
  mongodb_keyfile:

networks:
  auction-network:
    driver: bridge
